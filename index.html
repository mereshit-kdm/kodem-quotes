<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kodem Quotes</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="site-header">
  <a class="admin-link" href="admin.html" title="Administration">⚙️</a>
  <h1>All Quotes</h1>
  <p>Citations par thèmes</p>
</header>

<main class="container">
  <section id="homePage">
    <input id="themeSearch" class="input" type="search" placeholder="Rechercher un thème..." />
    <div id="themeList" class="theme-grid"></div>
  </section>

  <section id="quotesPage" class="hidden">
    <button class="back-button" onclick="goBack()">← Retour aux thèmes</button>
    <h2 id="themeTitle"></h2>
    <p id="quoteCount"></p>

    <input id="quoteSearch" class="input" type="search" placeholder="Rechercher dans les citations..." />

    <select id="classifyBy" class="input">
      <option value="all">Toutes les citations</option>
      <option value="author">Classer par source / auteur</option>
      <option value="reference">Classer par référence</option>
    </select>

    <div id="quotesContainer"></div>
  </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
