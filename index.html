<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kodem Quotes</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      font-size: 3rem;
    }

    .quote-box {
      max-width: 900px;
      margin: 40px auto;
      padding: 40px;
      background: white;
      color: #111827;
      border-radius: 18px;
      font-size: 1.8rem;
      line-height: 1.5;
    }

    button {
      padding: 16px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>Kodem Quotes</h1>
  <p>Citations inspirantes</p>
</header>

<main>
  <div class="quote-box" id="quote">
    Chargement des citations...
  </div>

  <button onclick="showRandomQuote()">Nouvelle citation</button>
</main>

<script>
  const files = [
    "Quotes/amour.txt",
    "Quotes/foi.txt",
    "Quotes/sagesse.txt"
  ];

  let quotes = [];

  async function loadQuotes() {
    for (const file of files) {
      const response = await fetch(file);
      const text = await response.text();

      const lines = text
        .split("\n")
        .map(line => line.trim())
        .filter(line => line.length > 0);

      quotes.push(...lines);
    }

    showRandomQuote();
  }

  function showRandomQuote() {
    if (quotes.length === 0) {
      document.getElementById("quote").textContent = "Aucune citation trouvée.";
      return;
    }

    const randomIndex = Math.floor(Math.random() * quotes.length);
    document.getElementById("quote").textContent = quotes[randomIndex];
  }

  loadQuotes();
</script>

</body>
</html>
