<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Kodem Quotes</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="site-header">
  <a class="admin-link" href="index.html" title="Retour">🏠</a>
  <h1>Admin Kodem Quotes</h1>
  <p>Ajouter une citation et suivre le déploiement</p>
</header>

<main class="container admin-container">
  <a class="back-link" href="index.html">← Retour au site</a>

  <section class="admin-card">
    <h2>Ajouter une citation</h2>

    <form id="quoteForm">
      <label>Mot de passe admin</label>
      <input id="password" class="input" type="password" required />

      <label>Thème</label>
      <input id="theme" class="input" type="text" placeholder="Exemple : Amour, Foi, Sagesse" list="themeOptions" required />
      <datalist id="themeOptions"></datalist>

      <label>Citation</label>
      <textarea id="citation" class="input textarea" placeholder="Écrire la citation..." required></textarea>

      <label>Source / Auteur</label>
      <input id="author" class="input" type="text" placeholder="Exemple : Paul, Jésus, Socrate..." />

      <label>Référence</label>
      <input id="reference" class="input" type="text" placeholder="Exemple : Jean 15:12" />

      <button id="submitBtn" class="primary-button" type="submit">Ajouter la citation</button>
    </form>

    <div id="message" class="message hidden"></div>

    <div id="deployBox" class="deploy-box hidden">
      <div class="deploy-title">Déploiement GitHub Pages</div>
      <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
      <p id="deployStatus">En attente...</p>
      <p id="deployTimer" class="muted"></p>
      <a id="viewSiteBtn" class="primary-button hidden" href="index.html">Voir le site</a>
      <button id="addAnotherBtn" class="secondary-button hidden" type="button">Ajouter une autre citation</button>
    </div>
  </section>
</main>

<script src="js/admin.js"></script>
</body>
</html>
